<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>New Enquiry</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<div class="content">

<header class="header">

<div class="header-title">
<h1>New Enquiry</h1>
<p>Add a new lead</p>
</div>

</header>

<main>

<div class="card">

<form id="enquiryForm" class="grid">

<input id="studentName" placeholder="Student Name" required>

<input id="parentName" placeholder="Parent Name">

<input id="phone" placeholder="Phone" required>

<select id="course">
<option value="">Select Course</option>
</select>

<textarea id="notes" placeholder="Notes"></textarea>

<button class="btn-primary">Create Enquiry</button>

</form>

</div>

</main>

</div>

</div>

<script type="module" src="js/enquiries-form.js"></script>

</body>
</html>
